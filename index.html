<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinfonía Global Records | Official Label Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff; /* Cian Eléctrico */
            --bg: #030303; /* Negro absoluto para resaltar el 3D */
            --surface: #0f0f0f;
            --border: rgba(255, 255, 255, 0.08);
            --legal-text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN (Sticky para profesionalismo) --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 6%; background: rgba(3, 3, 3, 0.9);
            backdrop-filter: blur(15px); z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.1rem; letter-spacing: 4px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .logo span { color: var(--primary); }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 30px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* --- HERO - PORTADA CON EFECTO 3D FLOTANTE --- */
        header {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: relative; padding: 0 10%;
            /* Perspectiva para el efecto 3D profundo */
            perspective: 2000px; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #030303 100%);
        }

        /* Contenedor del Título 3D */
        .title-3d-wrapper {
            position: relative;
            /* Activamos 3D para los hijos */
            transform-style: preserve-3d;
            /* Animación de FLOTACIÓN y ROTACIÓN SUAVE */
            animation: floatAndRotate 8s ease-in-out infinite;
            margin-bottom: 40px;
        }

        /* El Texto 3D Principal (Cromado/Cian) */
        .title-3d {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.2rem, 8vw, 5rem);
            font-weight: 700;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            
            /* EFECTO CROMADO/METÁLICO CON GRADIENTE Y SOMBRAS */
            background: linear-gradient(135deg, #fff 0%, #aae 40%, var(--primary) 50%, #fff 60%, #aae 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Sombra paralela profunda para simular volumen 3D real */
            filter: drop-shadow(0 5px 15px rgba(0, 212, 255, 0.4)) 
                    drop-shadow(0 15px 30px rgba(0, 0, 0, 0.8));
            
            position: relative;
            z-index: 2;
        }

        /* Sombra flotante proyectada en el fondo (para realismo) */
        .title-3d-shadow {
            position: absolute;
            bottom: -50px; left: 50%;
            transform: translateX(-50%) rotateX(90deg);
            width: 80%; height: 40px;
            background: radial-gradient(ellipse at center, rgba(0, 212, 255, 0.15) 0%, rgba(3, 3, 3, 0) 70%);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.8;
            animation: shadowFloat 8s ease-in-out infinite;
        }

        /* ANIMACIONES CSS AVANZADAS */
        
        /* 1. Flotación y rotación 3D del texto */
        @keyframes floatAndRotate {
            0%, 100% {
                transform: translateY(0) rotateX(5deg) rotateY(-5deg);
            }
            50% {
                transform: translateY(-25px) rotateX(-5deg) rotateY(5deg);
            }
        }

        /* 2. Flotación de la sombra (se expande/contrae) */
        @keyframes shadowFloat {
            0%, 100% {
                transform: translateX(-50%) rotateX(90deg) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translateX(-50%) rotateX(90deg) scale(1.1);
                opacity: 0.5;
            }
        }

        /* --- RESTO DE SECCIONES (Mantenemos profesionalismo) --- */
        header p { color: #666; font-size: 0.9rem; max-width: 650px; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; }
        .btn-main {
            display: inline-block; padding: 18px 45px; background: var(--primary);
            color: #000; text-decoration: none; font-weight: 900; font-size: 0.75rem;
            letter-spacing: 3px; text-transform: uppercase; margin-top: 40px; transition: 0.3s;
            border-radius: 2px;
        }
        .btn-main:hover { background: #fff; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .container { width: 88%; max-width: 1300px; margin: auto; padding: 120px 0; }
        h2.title { font-family: 'Syncopate', sans-serif; font-size: 1.8rem; margin-bottom: 70px; border-left: 3px solid var(--primary); padding-left: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .grid-services { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .service-box { background: var(--surface); padding: 60px; border-radius: 4px; border: 1px solid var(--border); transition: 0.4s; }
        .service-box:hover { border-color: var(--primary); background: #111; transform: translateY(-5px); }
        .service-box h3 { font-size: 1.3rem; margin-bottom: 20px; letter-spacing: 1px; color: #fff; }
        .service-box p { color: #777; font-size: 0.9rem; }

        .copyright-bar { background: #010101; padding: 40px 6%; text-align: center; border-top: 1px solid var(--border); }
        .copy-text { font-size: 0.65rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

    </style>
</head>
<body>
    <header>
    <div class="title-3d-wrapper">
        <div class="title-3d">
            SINFONÍA<br>GLOBAL
        </div>
        <div class="title-3d-shadow"></div>
    </div>
    <p>Independent Music Group / Global Sound</p>

    <a href="https://wa.me/526671815115?text=Hola,%20quiero%20unirme%20al%20roster%20de%20Sinfonia%20Global"
       class="btn-main" 
       target="_blank">
        ÚNETE AL ROSTER
    </a>
</header>
